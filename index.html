<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fly-Ventory</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4efe6;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1f1f1f;
  color: white;
  padding: 10px 20px;
}

.brand {
  font-size: 22px;
  font-weight: bold;
}

.cart {
  font-size: 18px;
}

/* HERO */
.hero {
  background: linear-gradient(135deg, #2f5d50 50%, #333 50%);
  color: white;
  text-align: center;
  padding: 60px 20px;
}

/* PRODUCTS */
.products {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  background: #2f5d50;
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}

/* FOOTER */
footer {
  background: #1f1f1f;
  color: white;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <div class="brand">Fly-Ventory</div>
  <div class="cart">🛒 <span id="cart-count">0</span></div>
</header>

<section class="hero">
  <h1>Safari Meets City Travel 🌍</h1>
  <p>Smart Travel Gear & Trending Finds</p>
</section>

<section class="products">
  <h2>Products</h2>

  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1514474959185-1472d4c4e0d4">
      <h3>Backpack</h3>
      <p>$39.99</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1507473885765-e6ed057f782c">
      <h3>Desk Lamp</h3>
      <p>$24.99</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1585386959984-a41552231658">
      <h3>Wireless Earbuds</h3>
      <p>$49.99</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 Fly-Ventory</p>
</footer>

<script>
let count = 0;

function addToCart() {
  count++;
  document.getElementById("cart-count").innerText = count;
}
</script>

</body>
</html>
