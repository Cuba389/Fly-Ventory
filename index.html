<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fly-Ventory</title>

<style>
:root {
  --green: #2f5d50;
  --sand: #f4efe6;
  --dark: #1f1f1f;
}

/* RESET */
body {
  margin: 0;
  font-family: Arial;
  background: var(--sand);
}

/* HEADER */
header {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  align-items: center;
  background: var(--dark);
  color: white;
  padding: 10px;
}

.logo img {
  height: 40px;
}

.brand {
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.menu {
  text-align: right;
  font-size: 26px;
  cursor: pointer;
}

/* DROPDOWN */
.dropdown {
  display: none;
  position: absolute;
  right: 10px;
  top: 60px;
  background: white;
  padding: 10px;
  border-radius: 8px;
}

.dropdown a {
  display: block;
  padding: 8px;
  color: black;
}

/* HERO */
.hero {
  position: relative;
  padding: 80px 20px;
  text-align: center;
  color: white;
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--green) 50%, #333 50%);
  z-index: 0;
}

.hero-content {
  position: relative;
  z-index: 2;
}

/* PRODUCTS */
.products {
  padding: 40px 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

/* FOOTER */
footer {
  background: var(--dark);
  color: white;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
  </div>

  <div class="brand">Fly-Ventory</div>

  <div class="menu" onclick="toggleMenu()">☰</div>
</header>

<div class="dropdown" id="menu">
  <a href="#">Home</a>
  <a href="#">Travel Gear</a>
  <a href="#">Trending</a>
</div>

<section class="hero">
  <div class="hero-content">
    <h1>Safari Meets City Travel 🌍</h1>
    <p>Explore Gear. Travel Smart.</p>
  </div>
</section>

<section class="products">
  <h2>Trending Products</h2>

  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1514474959185-1472d4c4e0d4">
      <h3>Backpack</h3>
      <p>$39.99</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1507473885765-e6ed057f782c">
      <h3>Lamp</h3>
      <p>$24.99</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1585386959984-a41552231658">
      <h3>Earbuds</h3>
      <p>$49.99</p>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 Fly-Ventory</p>
</footer>

<script>
function toggleMenu() {
  let menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}
</script>

</body>
  </html>
